name: Build Android PHP Shared Library
run-name: Building PHP ${{ inputs.php_version }} for Android (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (arm64-v8a, armeabi-v7a, x86_64)'
        required: true
        default: 'arm64-v8a'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          
      - name: Set Target Based on Architecture
        run: |
          case "${{ inputs.arch }}" in
            arm64-v8a)
              echo "TARGET=aarch64-linux-android21" >> $GITHUB_ENV
              echo "TOOLCHAIN_PREFIX=aarch64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=arm64-v8a" >> $GITHUB_ENV
              ;;
            armeabi-v7a)
              echo "TARGET=armv7a-linux-androideabi21" >> $GITHUB_ENV
              echo "TOOLCHAIN_PREFIX=armv7a-linux-androideabi21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=armeabi-v7a" >> $GITHUB_ENV
              ;;
            x86_64)
              echo "TARGET=x86_64-linux-android21" >> $GITHUB_ENV
              echo "TOOLCHAIN_PREFIX=x86_64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=x86_64" >> $GITHUB_ENV
              ;;
          esac
          echo "TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          
      - name: Sync Builder Dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs
        
      - name: Configure PHP Build for Android
        run: |
          # Download PHP source
          ./bin/spc download php-src --with-php=${{ inputs.php_version }} --no-interaction
          
          # Download extension libraries
          ./bin/spc download openssl,curl,zlib,sqlite3,oniguruma --no-interaction
          
          # Set Android toolchain
          export PATH=$TOOLCHAIN:$PATH
          export CC=$TOOLCHAIN/$TOOLCHAIN_PREFIX-clang
          export CXX=$TOOLCHAIN/$TOOLCHAIN_PREFIX-clang++
          export AR=$TOOLCHAIN/llvm-ar
          export LD=$TOOLCHAIN/ld.lld
          export RANLIB=$TOOLCHAIN/llvm-ranlib
          export STRIP=$TOOLCHAIN/llvm-strip
          
          # Configure for Android - THIS IS CRITICAL
          ./bin/spc configure \
            --cc=$CC \
            --cxx=$CXX \
            --ar=$AR \
            --ld=$LD \
            --target=$TARGET \
            --with-php=${{ inputs.php_version }} \
            --enable-zts \
            --disable-opcache-jit
          
      - name: Build PHP as Static Library
        run: |
          export PATH=$TOOLCHAIN:$PATH
          export CC=$TOOLCHAIN/$TOOLCHAIN_PREFIX-clang
          export CXX=$TOOLCHAIN/$TOOLCHAIN_PREFIX-clang++
          
          # Build static library (not executable)
          make clean || true
          make -j$(nproc) install-cli
          
      - name: Create Android JNI Library
        run: |
          mkdir -p output/jniLibs/${{ env.OUTPUT_ARCH }}
          
          # The build creates libphp.a (static library) - we need to create a wrapper
          # Create a small wrapper that will be our .so
          cat > php_wrapper.c << 'EOF'
#include <stdio.h>
#include <stdlib.h>
#include <unistd.h>

// This wrapper will become our .so that Android can load
int main(int argc, char *argv[]) {
    // Execute the real PHP binary from our static build
    extern int php_cli_main(int argc, char *argv[]);
    return php_cli_main(argc, argv);
}
EOF

          # Compile wrapper with static PHP library
          $TOOLCHAIN/$TOOLCHAIN_PREFIX-clang \
            -o output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so \
            php_wrapper.c \
            -L./install/lib \
            -lphp \
            -Wl,-soname,libphp.so \
            -shared \
            -fPIC
          
      - name: Strip Debug Symbols
        run: |
          $TOOLCHAIN/llvm-strip output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
          
      - name: Verify ELF Format
        run: |
          echo "=== VERIFYING BINARY FORMAT ==="
          file output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
          readelf -h output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so | grep -E "Class|Machine"
          
      - name: Upload PHP Library
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android-${{ inputs.arch }}
          path: output/jniLibs/
