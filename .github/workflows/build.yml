name: Build Android PHP
on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (aarch64 or arm)'
        required: true
        default: 'aarch64'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout SPC
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom
          
      - name: Install SPC Builder
        run: composer install --no-dev -a --ignore-platform-reqs
        
      - name: Download PHP Source & Extensions
        run: ./bin/spc download --with-php=${{ github.event.inputs.php_version }} "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" --ignore-cache
        
      - name: Compile Android Native Engine
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          ./bin/spc doctor --os=android
          ./bin/spc build "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" --build-cli --os=android --arch=${{ github.event.inputs.arch }}
          
      - name: Upload Compiled Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-${{ github.event.inputs.arch }}
          path: buildroot/bin/php
