name: Build Android PHP
on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (aarch64 or arm)'
        required: true
        default: 'aarch64'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Sync Builder Dependencies
        run: composer update --no-dev --ignore-platform-reqs --no-interaction
        
      - name: Download PHP Source
        # FIXED: Added --os and --arch here so the builder knows WHICH source to get
        run: |
          ./bin/spc download --with-php=${{ github.event.inputs.php_version }} \
          "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" \
          --os=android --arch=${{ github.event.inputs.arch }} --no-interaction
        
      - name: Compile Android Native Engine
        run: |
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          
          # FIXED: Doctor now requires the OS and Arch to verify the NDK
          ./bin/spc doctor --os=android --arch=${{ github.event.inputs.arch }}
          
          # FIXED: Build command is now clean of OS/Arch flags
          ./bin/spc build "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" \
          --build-cli --no-interaction
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-${{ github.event.inputs.arch }}
          path: buildroot/bin/php
