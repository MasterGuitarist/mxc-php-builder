name: Get PHP Binaries from Termux
run-name: Downloading PHP ${{ inputs.php_version }} for Android

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Create Directory Structure
        run: |
          mkdir -p output/jniLibs/arm64-v8a
          mkdir -p output/jniLibs/armeabi-v7a
          mkdir -p output/jniLibs/x86_64
          
      - name: Download Termux PHP Packages
        run: |
          # For PHP 8.4
          wget https://packages.termux.dev/apt/termux-main/pool/main/p/php/php_8.4.18_aarch64.deb -O php-arm64.deb || true
          wget https://packages.termux.dev/apt/termux-main/pool/main/p/php/php_8.4.18_arm.deb -O php-arm.deb || true
          
      - name: Extract PHP Binaries
        run: |
          # Extract arm64 binary if available
          if [ -f php-arm64.deb ]; then
            dpkg -x php-arm64.deb extract-arm64
            if [ -f extract-arm64/data/data/com.termux/files/usr/bin/php ]; then
              cp extract-arm64/data/data/com.termux/files/usr/bin/php output/jniLibs/arm64-v8a/libphp.so
              echo "✅ PHP arm64 binary saved"
            fi
          fi
          
          # Extract arm binary if available
          if [ -f php-arm.deb ]; then
            dpkg -x php-arm.deb extract-arm
            if [ -f extract-arm/data/data/com.termux/files/usr/bin/php ]; then
              cp extract-arm/data/data/com.termux/files/usr/bin/php output/jniLibs/armeabi-v7a/libphp.so
              echo "✅ PHP arm binary saved"
            fi
          fi
          
      - name: Upload PHP Binaries
        uses: actions/upload-artifact@v4
        with:
          name: php-android-binaries
          path: output/jniLibs/
