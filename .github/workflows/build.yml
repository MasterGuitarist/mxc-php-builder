name: Build Android PHP
on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (aarch64 or arm)'
        required: true
        default: 'aarch64'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Sync Builder Dependencies
        run: composer update --no-dev --ignore-platform-reqs --no-interaction
        
      - name: Download and Build
        env:
          SPC_BUILD_OS: android
          SPC_BUILD_ARCH: ${{ github.event.inputs.arch }}
        run: |
          # 1. Prepare Environment
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          
          # 2. Download ONLY what is required for a CLI build
          # We include micro because the tool's internal validator checks for it by default
          ./bin/spc download php-src,micro,pkg-config,patch --with-php=${{ github.event.inputs.php_version }} --no-interaction
          
          # 3. Download mandatory external libraries for the extensions you want
          ./bin/spc download openssl,curl,zlib,sqlite,libxml2,oniguruma --no-interaction
          
          # 4. Doctor check (Verified: no flags needed here now)
          ./bin/spc doctor
          
          # 5. THE CRITICAL STEP: 
          # We use --build-cli ONLY. 
          # We DO NOT use --build-all or --build-micro, so it won't ask for those sources.
          ./bin/spc build "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" \
          --build-cli \
          --no-interaction
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-${{ github.event.inputs.arch }}
          path: buildroot/bin/php
