name: Build Android PHP Shared Library
run-name: Building PHP ${{ inputs.php_version }} for Android (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (arm64-v8a, armeabi-v7a, x86_64)'
        required: true
        default: 'arm64-v8a'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Set Architecture Mapping
        run: |
          case "${{ inputs.arch }}" in
            arm64-v8a)
              echo "SPC_ARCH=aarch64" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=arm64-v8a" >> $GITHUB_ENV
              ;;
            armeabi-v7a)
              echo "SPC_ARCH=arm" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=armeabi-v7a" >> $GITHUB_ENV
              ;;
            x86_64)
              echo "SPC_ARCH=x86_64" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=x86_64" >> $GITHUB_ENV
              ;;
          esac
          
      - name: Sync Builder Dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs
        
      - name: Download and Build for Android
        run: |
          # Download PHP source and extensions
          ./bin/spc download php-src --with-php=${{ inputs.php_version }} --no-interaction
          ./bin/spc download openssl,curl,zlib,sqlite3,oniguruma --no-interaction
          
          # Build for Android using built-in support
          # The tool will automatically detect cross-compilation from environment
          ./bin/spc build "openssl,curl,zlib,sqlite3,oniguruma,mbstring,pdo,pdo_sqlite,fileinfo,session" \
            --build-embed \
            --with-micro-fake-cli \
            --no-interaction
          
      - name: Create JNI Structure
        run: |
          mkdir -p output/jniLibs/${{ env.OUTPUT_ARCH }}
          cp buildroot/bin/php output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android-${{ env.OUTPUT_ARCH }}
          path: output/jniLibs/
