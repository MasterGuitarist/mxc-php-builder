name: Build Android PHP
on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (aarch64 or arm)'
        required: true
        default: 'aarch64'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Sync Builder Dependencies
        run: composer update --no-dev --ignore-platform-reqs --no-interaction
        
      - name: Download and Build
        env:
          SPC_BUILD_OS: android
          SPC_BUILD_ARCH: ${{ github.event.inputs.arch }}
        run: |
          # 1. Prepare Environment
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          
          # 2. Download ONLY the core PHP source first to ensure [php-src] is locked
          ./bin/spc download php-src --with-php=${{ github.event.inputs.php_version }} --no-interaction
          
          # 3. Download the actual external libraries (NOT the internal extensions)
          # Note: mbstring, pdo, etc. are INSIDE php-src, so we don't ask spc to download them separately
          ./bin/spc download openssl,curl,zlib,sqlite --no-interaction
          
          # 4. Doctor check
          ./bin/spc doctor
          
          # 5. Final Build - We list the extensions here, and SPC pulls them from the locked php-src
          ./bin/spc build "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" \
          --build-cli --no-interaction
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-${{ github.event.inputs.arch }}
          path: buildroot/bin/php
