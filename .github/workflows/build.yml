name: Get PHP Binaries
run-name: Downloading PHP ${{ inputs.php_version }}

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download PHP Binaries
        run: |
          # Create directories
          mkdir -p php-android/arm64-v8a
          mkdir -p php-android/armeabi-v7a
          
          # Download 64-bit
          echo "Downloading PHP ${{ inputs.php_version }} 64-bit..."
          curl -L -o php64.deb "https://packages.termux.dev/apt/termux-main/pool/main/p/php/php_${{ inputs.php_version }}_aarch64.deb" || \
          curl -L -o php64.deb "https://packages.termux.dev/apt/termux-main/pool/main/p/php8/php_${{ inputs.php_version }}_aarch64.deb" || \
          curl -L -o php64.deb "https://github.com/termux/termux-packages/releases/download/apt-android-7/php_${{ inputs.php_version }}_aarch64.deb"
          
          # Download 32-bit
          echo "Downloading PHP ${{ inputs.php_version }} 32-bit..."
          curl -L -o php32.deb "https://packages.termux.dev/apt/termux-main/pool/main/p/php/php_${{ inputs.php_version }}_arm.deb" || \
          curl -L -o php32.deb "https://packages.termux.dev/apt/termux-main/pool/main/p/php8/php_${{ inputs.php_version }}_arm.deb" || \
          curl -L -o php32.deb "https://github.com/termux/termux-packages/releases/download/apt-android-7/php_${{ inputs.php_version }}_arm.deb"
          
          # Extract 64-bit
          if [ -f php64.deb ] && [ -s php64.deb ]; then
            echo "Extracting 64-bit PHP..."
            dpkg -x php64.deb extract64
            find extract64 -name php -type f -exec cp {} php-android/arm64-v8a/libphp.so \;
            chmod +x php-android/arm64-v8a/libphp.so
            echo "✅ 64-bit PHP saved"
          else
            echo "❌ 64-bit download failed"
          fi
          
          # Extract 32-bit
          if [ -f php32.deb ] && [ -s php32.deb ]; then
            echo "Extracting 32-bit PHP..."
            dpkg -x php32.deb extract32
            find extract32 -name php -type f -exec cp {} php-android/armeabi-v7a/libphp.so \;
            chmod +x php-android/armeabi-v7a/libphp.so
            echo "✅ 32-bit PHP saved"
          else
            echo "❌ 32-bit download failed"
          fi
          
      - name: Show files
        run: |
          echo "Files downloaded:"
          ls -la php-android/*/
          
      - name: Upload PHP Binaries
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android
          path: php-android/
