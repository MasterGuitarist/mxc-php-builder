name: Build Android PHP Shared Library
run-name: Building PHP ${{ inputs.php_version }} for Android (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (arm64-v8a, armeabi-v7a, x86_64)'
        required: true
        default: 'arm64-v8a'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          
      - name: Install ALL System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            autoconf \
            automake \
            libtool \
            make \
            cmake \
            re2c \
            bison \
            flex \
            gcc \
            g++ \
            libxml2-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            libonig-dev \
            libzip-dev \
            libbz2-dev \
            libreadline-dev \
            libedit-dev \
            libgmp-dev \
            libicu-dev \
            libpq-dev \
            libfreetype6-dev \
            libjpeg-dev \
            libpng-dev \
            libwebp-dev \
            libxpm-dev \
            libgd-dev \
            gettext \
            libgetopt-long-desktop-perl \
            wget \
            unzip \
            xz-utils
          
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          
      - name: Set Target Based on Architecture
        run: |
          case "${{ inputs.arch }}" in
            arm64-v8a)
              echo "TARGET=aarch64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=arm64-v8a" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=aarch64-linux-android21" >> $GITHUB_ENV
              ;;
            armeabi-v7a)
              echo "TARGET=armv7a-linux-androideabi21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=armeabi-v7a" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=armv7a-linux-androideabi21" >> $GITHUB_ENV
              ;;
            x86_64)
              echo "TARGET=x86_64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=x86_64" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=x86_64-linux-android21" >> $GITHUB_ENV
              ;;
          esac
          echo "TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          
      - name: Sync Builder Dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs
        
      - name: Run Doctor and Fix
        run: |
          ./bin/spc doctor --auto-fix
          
      - name: Download Everything
        run: |
          ./bin/spc download \
            --with-php=${{ inputs.php_version }} \
            --for-extensions="openssl,curl,zlib,sqlite3,mbstring,pdo,pdo_sqlite,fileinfo,session" \
            --no-interaction
          
      - name: Configure Build
        run: |
          export PATH="$TOOLCHAIN:$PATH"
          export CC="$TOOLCHAIN/$ARCH_TRIPLE-clang"
          export CXX="$TOOLCHAIN/$ARCH_TRIPLE-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld.lld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"
          
          # Configure for Android
          ./bin/spc configure \
            --target="$TARGET" \
            --with-php="${{ inputs.php_version }}" \
            --enable-zts \
            --disable-opcache-jit
          
      - name: Build PHP
        run: |
          export PATH="$TOOLCHAIN:$PATH"
          export CC="$TOOLCHAIN/$ARCH_TRIPLE-clang"
          export CXX="$TOOLCHAIN/$ARCH_TRIPLE-clang++"
          
          # Build only essential extensions first
          ./bin/spc build \
            openssl,curl,zlib,sqlite3 \
            --build-embed \
            --with-micro-fake-cli \
            --no-interaction \
            --debug
          
      - name: Create Output
        run: |
          mkdir -p output/jniLibs/${{ env.OUTPUT_ARCH }}
          if [ -f buildroot/bin/php ]; then
            cp buildroot/bin/php output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
            file output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
          else
            echo "Build failed - binary not found"
            find . -name "php" -type f 2>/dev/null || true
          fi
          
      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android-${{ inputs.arch }}-debug
          path: |
            output/jniLibs/
            buildroot/logs/
