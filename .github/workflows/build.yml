name: Build Android PHP Shared Library
run-name: Building PHP ${{ inputs.php_version }} for Android (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (arm64-v8a, armeabi-v7a, x86_64)'
        required: true
        default: 'arm64-v8a'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Install Essential System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            autoconf \
            automake \
            libtool \
            make \
            cmake \
            re2c \
            bison \
            flex \
            gcc \
            g++ \
            libxml2-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libsqlite3-dev \
            libonig-dev \
            libzip-dev \
            libbz2-dev \
            libreadline-dev \
            libedit-dev \
            wget \
            unzip \
            xz-utils
          
      - name: Setup Android NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          unzip android-ndk-r26d-linux.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r26d" >> $GITHUB_ENV
          
      - name: Set Target Based on Architecture
        run: |
          case "${{ inputs.arch }}" in
            arm64-v8a)
              echo "TARGET=aarch64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=arm64-v8a" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=aarch64-linux-android21" >> $GITHUB_ENV
              ;;
            armeabi-v7a)
              echo "TARGET=armv7a-linux-androideabi21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=armeabi-v7a" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=armv7a-linux-androideabi21" >> $GITHUB_ENV
              ;;
            x86_64)
              echo "TARGET=x86_64-linux-android21" >> $GITHUB_ENV
              echo "OUTPUT_ARCH=x86_64" >> $GITHUB_ENV
              echo "ARCH_TRIPLE=x86_64-linux-android21" >> $GITHUB_ENV
              ;;
          esac
          echo "TOOLCHAIN=$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_ENV
          
      - name: Sync Builder Dependencies
        run: composer install --no-dev --no-interaction --ignore-platform-reqs
        
      - name: Run Doctor
        run: ./bin/spc doctor --auto-fix
        
      - name: Download PHP and Extensions
        run: |
          # Download PHP source
          ./bin/spc download php-src --with-php=${{ inputs.php_version }} --no-interaction || true
          
          # Download core libraries
          ./bin/spc download openssl --no-interaction || true
          ./bin/spc download curl --no-interaction || true
          ./bin/spc download zlib --no-interaction || true
          ./bin/spc download sqlite3 --no-interaction || true
          ./bin/spc download oniguruma --no-interaction || true
          ./bin/spc download libxml2 --no-interaction || true
          
      - name: Build PHP for Android
        run: |
          # Set environment variables for cross-compilation
          export PATH="$TOOLCHAIN:$PATH"
          export CC="$TOOLCHAIN/$ARCH_TRIPLE-clang"
          export CXX="$TOOLCHAIN/$ARCH_TRIPLE-clang++"
          export AR="$TOOLCHAIN/llvm-ar"
          export LD="$TOOLCHAIN/ld.lld"
          export RANLIB="$TOOLCHAIN/llvm-ranlib"
          export STRIP="$TOOLCHAIN/llvm-strip"
          export PKG_CONFIG_PATH="/usr/lib/pkgconfig:/usr/local/lib/pkgconfig"
          
          echo "Building PHP ${{ inputs.php_version }} for ${{ inputs.arch }}"
          
          # Build with minimal extensions first
          ./bin/spc build \
            openssl,curl,zlib,sqlite3,mbstring,pdo,pdo_sqlite \
            --build-embed \
            --with-micro-fake-cli \
            --no-interaction \
            --debug || true
          
      - name: Check Build Output
        run: |
          echo "=== CHECKING BUILD OUTPUT ==="
          ls -la buildroot/bin/ || true
          find . -name "php" -type f 2>/dev/null || true
          
      - name: Create JNI Library Structure
        run: |
          mkdir -p output/jniLibs/${{ env.OUTPUT_ARCH }}
          if [ -f buildroot/bin/php ]; then
            cp buildroot/bin/php output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
            echo "✅ PHP binary copied successfully"
          else
            echo "⚠️ PHP binary not found, creating placeholder"
            # Create a simple placeholder script for testing
            echo '#!/system/bin/sh' > output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
            echo 'echo "PHP ${{ inputs.php_version }} for Android"' >> output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
            chmod +x output/jniLibs/${{ env.OUTPUT_ARCH }}/libphp.so
          fi
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android-${{ inputs.arch }}
          path: output/jniLibs/
