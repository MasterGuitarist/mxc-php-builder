name: Build Android PHP
# THIS IS THE MAGIC LINE: It changes the display name in the Actions tab
run-name: Building PHP ${{ inputs.php_version }} (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.0.30'
      arch:
        description: 'Architecture (aarch64 or x86_64)'
        required: true
        default: 'aarch64'

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Builder
        uses: actions/checkout@v4
        with:
          repository: crazywhalecc/static-php-cli
          
      - name: Setup Host PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Host PHP version for Composer
          extensions: mbstring, curl, openssl, tokenizer, xml, dom, pdo, sqlite3
          
      - name: Sync Builder Dependencies
        run: composer install --no-dev --no-interaction
        
      - name: Download and Build
        env:
          # CRITICAL: OS must be 'linux' so SPC triggers the musl cross-compiler
          SPC_BUILD_OS: linux
          SPC_BUILD_ARCH: ${{ github.event.inputs.arch }}
        run: |
          # 1. Prepare Environment
          sudo apt-get update && sudo apt-get install -y qemu-user-static
          
          # 2. Download Core Sources
          ./bin/spc download php-src,micro,pkg-config,patch --with-php=${{ github.event.inputs.php_version }} --no-interaction
          
          # 3. Download Extension Libraries (oniguruma is required for mbstring)
          ./bin/spc download openssl,curl,zlib,sqlite,oniguruma --no-interaction
          
          # 4. Auto-fix Environment (This downloads the musl-cross-make toolchain)
          ./bin/spc doctor --auto-fix
          
          # 5. Build FULLY STATIC Linux Musl Binary
          ./bin/spc build "mbstring,openssl,pdo,pdo_sqlite,sqlite3,curl,zlib,fileinfo,session" \
          --build-cli \
          --no-interaction
          
      - name: Upload Finished Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-${{ github.event.inputs.arch }}
          path: buildroot/bin/php
