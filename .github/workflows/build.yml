name: Get PHP Binaries from Termux
run-name: Downloading PHP ${{ inputs.php_version }} for Android (${{ inputs.arch }})

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'
      arch:
        description: 'Architecture (arm64-v8a, armeabi-v7a, x86_64)'
        required: true
        default: 'arm64-v8a'

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Show Inputs
        run: |
          echo "Building PHP ${{ inputs.php_version }} for ${{ inputs.arch }}"
          
      - name: Create Directory Structure
        run: |
          mkdir -p output/jniLibs/${{ inputs.arch }}
          
      - name: Download Termux PHP Package
        run: |
          # Map architecture to Termux format
          if [ "${{ inputs.arch }}" = "arm64-v8a" ]; then
            TERMUX_ARCH="aarch64"
          elif [ "${{ inputs.arch }}" = "armeabi-v7a" ]; then
            TERMUX_ARCH="arm"
          elif [ "${{ inputs.arch }}" = "x86_64" ]; then
            TERMUX_ARCH="x86_64"
          else
            echo "Unknown architecture: ${{ inputs.arch }}"
            exit 1
          fi
          
          echo "Downloading PHP ${{ inputs.php_version }} for $TERMUX_ARCH..."
          
          # Try to download from Termux repo
          URL="https://packages.termux.dev/apt/termux-main/pool/main/p/php/php_${{ inputs.php_version }}_${TERMUX_ARCH}.deb"
          wget "$URL" -O php.deb || echo "Download failed"
          
      - name: Extract PHP Binary
        run: |
          if [ -f php.deb ]; then
            dpkg -x php.deb extract/
            if [ -f extract/data/data/com.termux/files/usr/bin/php ]; then
              cp extract/data/data/com.termux/files/usr/bin/php output/jniLibs/${{ inputs.arch }}/libphp.so
              echo "✅ PHP binary saved to output/jniLibs/${{ inputs.arch }}/libphp.so"
              file output/jniLibs/${{ inputs.arch }}/libphp.so
            else
              echo "❌ PHP binary not found in package"
            fi
          else
            echo "❌ Download failed - PHP ${{ inputs.php_version }} may not be available for ${{ inputs.arch }}"
            # Create a placeholder with error message
            echo "PHP ${{ inputs.php_version }} not available for ${{ inputs.arch }}" > output/jniLibs/${{ inputs.arch }}/error.txt
          fi
          
      - name: Upload PHP Binary
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-${{ inputs.arch }}
          path: output/jniLibs/
