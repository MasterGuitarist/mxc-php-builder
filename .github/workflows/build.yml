name: Create PHP Android Release
run-name: Creating PHP ${{ inputs.php_version }} Android Package

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version'
        required: true
        default: '8.4.18'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create Directories
        run: |
          mkdir -p php-android/arm64-v8a
          mkdir -p php-android/armeabi-v7a
          
      - name: Create PHP Wrapper Scripts
        run: |
          # Create 64-bit wrapper
          cat > php-android/arm64-v8a/libphp.so << 'EOF'
#!/system/bin/sh
# PHP ${{ inputs.php_version }} Wrapper for arm64-v8a
# Instructions: Install Termux and run: pkg install php
echo "PHP ${{ inputs.php_version }} for Android (arm64-v8a)"
echo "Please install PHP via Termux:"
echo "1. Install Termux from F-Droid"
echo "2. Run: pkg install php"
if command -v php >/dev/null 2>&1; then
  exec php "$@"
else
  exit 1
fi
EOF

          # Create 32-bit wrapper  
          cat > php-android/armeabi-v7a/libphp.so << 'EOF'
#!/system/bin/sh
# PHP ${{ inputs.php_version }} Wrapper for armeabi-v7a
# Instructions: Install Termux and run: pkg install php
echo "PHP ${{ inputs.php_version }} for Android (armeabi-v7a)"
echo "Please install PHP via Termux:"
echo "1. Install Termux from F-Droid"
echo "2. Run: pkg install php"
if command -v php >/dev/null 2>&1; then
  exec php "$@"
else
  exit 1
fi
EOF
          chmod +x php-android/*/libphp.so
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ inputs.php_version }}-android-wrapper
          path: php-android/
